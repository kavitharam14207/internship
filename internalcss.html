<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternalCSS</title>
    <style>
        #para {
            font-size: 30px;
            text-align: center;
            color: rgb(70, 149, 55);
        }

        .para {
            font-size: 20px;
            text-align: center;
            color: rgb(6, 90, 62);
        }
    </style>
</head>

<body style="background-color: rgb(182, 247, 225);">
    <h1 style="color: rgb(2, 12, 6);text-align: center;font-size: 40px;"><u>Internal CSS</u></h1>
    <p id="para">Welcome to Internal CSS Practice. This paragraph is styled using an ID selector, which applies a center
        alignment and a leaf green text color.</p>
    <p class="para">This is the second paragraph. It is styled using a Class selector, which aligns the text to the
        center and applies a green text color.</p>
</body>

</html>
