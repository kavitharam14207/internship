<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>message page</title>
    <link rel="stylesheet" href="message.css">
</head>

<body>
    <h1 style="color:rgb(5, 5, 18);text-align: center;font-family:Gill Sans;">Send me a message</h1>
    <div class="name"><input type="text" placeholder="Enter Your Name/Company*"></div>
    <div class="container">
        <div><input type="mail" placeholder="Enter Your Email *"></div>
        <div><input type="tel" placeholder="Enter Phone Number *"></div>
    </div>
    <div class="message"><input type="text" placeholder="Write Message....."></div>
    <div class="container1">
        <button class="button">Send Message </button>
    </div>
</body>

</html>
